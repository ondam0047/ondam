<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="barGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6FA1E5"/>
      <stop offset="100%" stop-color="#1F4E91"/>
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9FD6C0"/>
      <stop offset="100%" stop-color="#6FB59C"/>
    </linearGradient>
  </defs>

  <!-- 체크리스트 줄 3개 (위 → 아래로 점점 길어지는 막대) -->
  <rect x="12" y="32" width="36" height="11" rx="5.5" fill="url(#barGradient)"/>
  <rect x="10" y="52" width="46" height="11" rx="5.5" fill="url(#barGradient)"/>
  <rect x="8"  y="72" width="56" height="11" rx="5.5" fill="url(#barGradient)"/>

  <!-- 이파리 두 장 (가운데에서 솟아오름) -->
  <path d="M48 36 C48 22, 42 16, 38 16 C38 22, 42 32, 48 36 Z"
        fill="url(#leafGradient)"/>
  <path d="M52 36 C52 22, 58 16, 62 16 C62 22, 58 32, 52 36 Z"
        fill="url(#leafGradient)"/>

  <!-- 체크 마크 (오른쪽 위 진한 파랑) -->
  <path d="M65 32 L74 42 L92 18"
        stroke="#3D7CC9"
        stroke-width="9"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
